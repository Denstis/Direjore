# Глобальные настройки Дирижёра

# LM Studio Server
lmstudio:
  base_url: "http://localhost:1234"
  api_key: "lm-studio"  # Заглушка для совместимости с OpenAI SDK
  
# Порт для внутреннего API (если потребуется)
server:
  port: 8765
  
# Корневая папка для проектов
project_root: "./projects"

# Уровень логирования: DEBUG, INFO, WARNING, ERROR
log_level: "INFO"

# Таймауты (секунды)
timeouts:
  llm_request: 120
  tool_execution: 30
  
# Лимиты
limits:
  max_iterations: 10  # Максимум итераций дирижёра
  max_plan_steps: 7   # Максимум шагов в плане
  max_context_tokens: 28000  # 80% от 32k окна Qwen

# Настройки по умолчанию
defaults:
  temperature: 0.7
  top_p: 0.9
  parallel_tool_calls: false
